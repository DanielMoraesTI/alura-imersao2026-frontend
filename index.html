<!DOCTYPE html>

<body>

        <section aria-labelledby="titulo-perfis">
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Ativar modo claro" aria-pressed="false"></button>

            <nav aria-label="Perfis disponíveis">
                <ul class="profiles">
                    <li>
                        <a class="profile" href="catalogo/catalogo.html" aria-label="Abrir Perfil 1">
                            <figure>
                                <img src="/assets/GandALF.jpg" alt="O personagem ALF, o ETeimoso, vestido como o feiticeiro Gandalf de O Senhor dos Anéis, segurando um cajado mágico numa biblioteca antiga.">
                                <figcaption>GandALF</figcaption>
                            </figure>

                    </li>
                    <li>
                        <a class="profile" href="catalogo/catalogo.html" aria-label="Abrir Perfil 2">

                                <figcaption>Perfil 2</figcaption>
                            </figure>

                    </li>
                    <li>
                        <a class="profile" href="catalogo/catalogo.html" aria-label="Abrir Perfil 3">

                    </li>
                    <li>
                        <a class="profile" href="catalogo/catalogo.html" aria-label="Abrir Perfil 4">
                            <figure>
                                <img src="/assets/Jiraiya.jpg" alt="Ninja Jiraiya em estilo realista usando armadura vermelha e dourada com malha de metal, em pose de combate sob um céu azul.">
                                <figcaption>Jiraiya</figcaption>
                            </figure>

                    </li>
                </ul>
            </nav>
        </section>

    <footer>
        <p>@ Daniel Moraes - Imersão Frontend 2026 - Alura</p>
